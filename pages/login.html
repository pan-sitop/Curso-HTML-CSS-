<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Code Cats Studio</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Lexend:wght@600;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
    <link rel="stylesheet" href="../styles/login.css">
</head>

<body>
    <header class="main-header">
        <div class="container header-flex">
            <div class="logo">CODE CATS STUDIO</div>
            <nav aria-label="Navegación Principal">
                <ul class="nav-links">
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="./talleres.html">Talleres</a></li>
                    <li><a href="./login.html">Inicia Sesión</a></li>
                    <li><a href="./register.html">Registrarse</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container auth-layout">
        <article class="auth-card">
            <header>
                <h2>Iniciar Sesión</h2>
            </header>
            <form id="loginform" class="auth-form" action="../index.html">
                <div class="form-group">
                    <label for="email">Correo Electrónico</label>
                    <input type="email" id="email" name="email" placeholder="ejemplo@gmail.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <input type="password" id="password" minlength="5" name="password" placeholder="mín. 5 caracteres"
                        required>
                </div>
                <button type="submit" class="btn-submit">Ingresar</button>
            </form>
            <a href="./register.html" class="auth-link">¿No tienes cuenta? Regístrate Aquí</a>
        </article>
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 Code Cats Studio — Arturo & Miguel</p>
        </div>
    </footer>
</body>

</html>
